<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RTOA v0.17.3 - Resilient Tuner</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #0f0; padding: 20px; font-size: 12px; }
        .control-panel { background: #111; border: 1px solid #0f0; padding: 15px; margin-bottom: 20px; }
        textarea { width: 100%; height: 160px; background: #000; color: #0f0; border: 1px solid #333; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 15px; background: #0f0; color: #000; font-weight: bold; border: none; cursor: pointer; }
        button:disabled { background: #050; color: #0a0; cursor: not-allowed; }
        .progress-container { width: 100%; background: #222; height: 30px; margin: 15px 0; border: 1px solid #0f0; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: #0f0; transition: width 0.1s; }
        #progress-text { position: absolute; width: 100%; text-align: center; color: #000; font-weight: bold; top: 6px; }
        .results-scroll { overflow-x: auto; margin-top: 20px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; background: #0a0a0a; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background: #222; position: sticky; top: 0; }
        .v09 { background: #1a1a00; }
        .best { color: #fff; background: #004400; font-weight: bold; }
        .log { height: 120px; overflow-y: auto; background: #000; border: 1px solid #222; padding: 10px; margin-top: 10px; color: #888; font-size: 0.9em; }
    </style>
</head>
<body>

<h1>RTOA v0.17.3: Phase 1 — Resilient Grid Sweep</h1>

<div class="control-panel">
    <textarea id="json-config"></textarea>
    <button id="runBtn" onclick="runResilientSweep()">Ignite Exhaustive Sweep</button>
</div>

<div class="progress-container">
    <div id="progress-bar"></div>
    <div id="progress-text">READY</div>
</div>

<div class="results-scroll">
    <table id="results-table">
        <thead>
            <tr>
                <th>Class</th>
                <th>S/W/H/R/C</th>
                <th>Med (μs)</th>
                <th>P95</th>
                <th>P99</th>
                <th>StdDev</th>
                <th>X-ing/1k</th>
                <th>Check</th>
            </tr>
        </thead>
        <tbody id="results-body"></tbody>
    </table>
</div>

<div class="log" id="sys-log">System initialized. Fallback logic active.</div>

<script id="worker-script" type="text/javascript-worker">
    self.onmessage = function(e) {
        const { config, sharedBuffer, trialSeed, useSAB } = e.data;
        const lot = useSAB ? new Int32Array(sharedBuffer) : new Int32Array(config.SIZE);
        const SIZE = config.SIZE;
        
        function mulberry32(a) {
            return function() {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }
        const rand = mulberry32(trialSeed);
        const getHash = (k) => (k % 10 === 0) ? (k % 100) : (k * 1337) % SIZE;

        let samples = [];
        let totalProbes = 0;
        let lineCrossings = 0;
        let checksum = 0n;

        // If not using SAB, worker must fill its own lot
        if(!useSAB) {
            for(let i=1; i<Math.floor(SIZE*config.LOAD); i++) {
                let p = getHash(i);
                for(let s=0; s<32; s++) {
                    if(lot[(p+s)%SIZE] === 0) { lot[(p+s)%SIZE] = i; break; }
                }
            }
        }

        const iterations = config.STEADY_OPS / config.BATCH_SIZE;
        for (let b = 0; b < iterations; b++) {
            let batch = [];
            for(let i=0; i<config.BATCH_SIZE; i++) batch.push(Math.floor(rand() * 100000) + 1);

            let t0 = performance.now();
            for (let k of batch) {
                let p = getHash(k);
                let startLine = p >> 4;
                let found = false;

                let range = (config.CLASS === 'v0.09') ? 16 : config.WINDOW;
                let stride = (config.CLASS === 'v0.09') ? 1 : config.STRIDE;

                for (let s = 0; s < range; s += stride) {
                    totalProbes++;
                    let idx = (p + s) % SIZE;
                    if ((idx >> 4) !== startLine) lineCrossings++;
                    if (lot[idx] === k) { found = true; break; }
                }
                checksum = ((checksum * 31n) + BigInt(k)) & ((1n << 64n) - 1n);
            }
            samples.push((performance.now() - t0) / config.BATCH_SIZE);
        }
        self.postMessage({ samples, lineCrossings, totalProbes, checksum: checksum.toString() });
    };
</script>

<script>
const DEFAULTS = {
    SIZE: 100000,
    LOAD: 0.95,
    TRIALS: 30,
    BATCH_SIZE: 1000,
    STEADY_OPS: 100000,
    STRIDES: [5, 7],
    WINDOWS: [16, 32],
    HOT_THRESHOLDS: [4],
    RATE_LIMITS: [50],
    CHURN_LEVELS: [0],
    SEED: 1337
};

const useSAB = typeof SharedArrayBuffer !== 'undefined';
document.getElementById('json-config').value = JSON.stringify(DEFAULTS, null, 4);

function log(msg) {
    const l = document.getElementById('sys-log');
    l.innerText += `> ${msg}\n`;
    l.scrollTop = l.scrollHeight;
}

async function runResilientSweep() {
    const configMatrix = JSON.parse(document.getElementById('json-config').value);
    const btn = document.getElementById('runBtn');
    const tbody = document.getElementById('results-body');
    const bar = document.getElementById('progress-bar');
    const txt = document.getElementById('progress-text');
    
    btn.disabled = true;
    tbody.innerHTML = '';
    log(useSAB ? "MODE: Atomic Shared Memory" : "MODE: Independent Cache Fallback");

    let sweep = [{ class: 'v0.09', s: 1, w: 16, h: 0, r: 0, c: 0 }];
    for(let s of configMatrix.STRIDES) 
        for(let w of configMatrix.WINDOWS)
            sweep.push({ class: 'v0.10', s, w, h: 4, r: 50, c: 0 });

    const sharedBuffer = useSAB ? new SharedArrayBuffer(configMatrix.SIZE * 4) : null;
    const results = [];

    for (let i = 0; i < sweep.length; i++) {
        const target = sweep[i];
        log(`Config: ${target.class} S:${target.s} W:${target.w}...`);
        
        let allSamples = [];
        let totalCrossings = 0;
        let totalProbes = 0;
        let lastCheck = "";

        for (let t = 0; t < configMatrix.TRIALS; t++) {
            // Fill shared lot if using SAB
            if(useSAB) {
                const lot = new Int32Array(sharedBuffer);
                lot.fill(0);
                for(let j=1; j<Math.floor(configMatrix.SIZE * configMatrix.LOAD); j++) {
                    let p = getHash(j, configMatrix.SIZE);
                    for(let s=0; s<32; s++) { if(lot[(p+s)%configMatrix.SIZE] === 0) { lot[(p+s)%configMatrix.SIZE] = j; break; } }
                }
            }

            const blob = new Blob([document.getElementById('worker-script').textContent], {type: 'text/javascript'});
            const worker = new Worker(URL.createObjectURL(blob));

            const trialResult = await new Promise(resolve => {
                worker.onmessage = (e) => resolve(e.data);
                worker.postMessage({
                    config: { ...configMatrix, CLASS: target.class, STRIDE: target.s, WINDOW: target.w },
                    sharedBuffer,
                    trialSeed: configMatrix.SEED + t,
                    useSAB
                });
            });

            allSamples.push(...trialResult.samples);
            totalCrossings += trialResult.lineCrossings;
            totalProbes += trialResult.totalProbes;
            lastCheck = trialResult.checksum;
            worker.terminate();

            let progress = ((i * configMatrix.TRIALS + t) / (sweep.length * configMatrix.TRIALS)) * 100;
            bar.style.width = progress + "%";
            txt.innerText = `${target.class} | T:${t+1}/${configMatrix.TRIALS}`;
            if(t % 5 === 0) await new Promise(r => setTimeout(r, 0));
        }

        allSamples.sort((a,b) => a-b);
        const mean = allSamples.reduce((a,b) => a+b, 0) / allSamples.length;
        results.push({
            class: target.class,
            label: `${target.s}/${target.w}`,
            med: allSamples[Math.floor(allSamples.length * 0.5)],
            p95: allSamples[Math.floor(allSamples.length * 0.95)],
            p99: allSamples[Math.floor(allSamples.length * 0.99)],
            std: Math.sqrt(allSamples.map(x => Math.pow(x-mean, 2)).reduce((a,b)=>a+b)/allSamples.length),
            crossRate: (totalCrossings / (totalProbes / 1000)),
            check: lastCheck.slice(-6)
        });
    }

    tbody.innerHTML = results.map((r, idx) => `
        <tr class="${r.class === 'v0.09' ? 'v09' : ''} ${idx === 0 && r.class === 'v0.10' ? 'best' : ''}">
            <td>${r.class}</td><td>${r.label}</td>
            <td>${(r.med * 1000).toFixed(3)}</td><td>${(r.p95 * 1000).toFixed(3)}</td>
            <td>${(r.p99 * 1000).toFixed(3)}</td><td>${(r.std * 1000).toFixed(3)}</td>
            <td>${r.crossRate.toFixed(2)}</td><td>${r.check}</td>
        </tr>
    `).join('');
    
    btn.disabled = false;
    txt.innerText = "SWEEP COMPLETE";
}

function getHash(k, size) { return (k % 10 === 0) ? (k % 100) : (k * 1337) % size; }
</script>
</body>
</html>
