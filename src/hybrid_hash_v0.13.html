<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RTOA v0.13 - Statistical Harness</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #0f0; padding: 20px; line-height: 1.2; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .panel { background: #111; border: 1px solid #333; padding: 15px; border-radius: 4px; }
        .env-log { font-size: 0.85em; color: #888; margin-bottom: 20px; border-left: 3px solid #555; padding-left: 10px; }
        .progress-container { width: 100%; background: #222; height: 25px; margin: 20px 0; border: 1px solid #0f0; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: #0f0; transition: width 0.1s; }
        #progress-text { position: absolute; width: 100%; text-align: center; color: #000; font-weight: bold; top: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background: #222; color: #fff; }
        .v09 { color: #ffff00; } .v10 { color: #ff00ff; }
        .box-plot { background: #000; height: 150px; width: 100%; margin-top: 10px; position: relative; border: 1px solid #444; }
        .whisker { position: absolute; height: 2px; background: #666; }
        .box { position: absolute; border: 2px solid; opacity: 0.8; }
        .median-line { position: absolute; width: 100%; height: 2px; background: white; }
        button { padding: 15px 30px; background: #0f0; color: #000; font-weight: bold; border: none; cursor: pointer; width: 100%; font-size: 1.1em; }
        button:disabled { background: #050; color: #0a0; cursor: not-allowed; }
        .error { color: #ff4444; font-weight: bold; border: 2px solid #ff4444; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>

<h1>RTOA v0.13: Statistical Benchmark Harness</h1>

<div class="env-log" id="env-data">Detecting environment...</div>

<div class="panel">
    <strong>Configuration:</strong>
    <span id="config-summary">Trials: 100 | Batch: 1000 | Load: 95% | Seed: 1337</span>
</div>

<div class="progress-container">
    <div id="progress-bar"></div>
    <div id="progress-text">READY</div>
</div>

<button id="runBtn" onclick="initiateSuite()">Execute v0.09 vs v0.10 Battle</button>

<div id="error-display"></div>

<div class="dashboard">
    <div class="panel">
        <div class="title v09">v0.09 (Static Window)</div>
        <div class="box-plot" id="plot-v09"></div>
        <table id="stats-v09">
            <tr><th>Metric</th><th>Value</th></tr>
        </table>
    </div>
    <div class="panel">
        <div class="title v10">v0.10 (Adaptive Stepped)</div>
        <div class="box-plot" id="plot-v10"></div>
        <table id="stats-v10">
            <tr><th>Metric</th><th>Value</th></tr>
        </table>
    </div>
</div>

<script>
/** ---------------------------------------------------------
 * HARNESS CONFIGURATION
 * --------------------------------------------------------- */
const CONFIG = {
    TRIALS: 100,
    BATCH_SIZE: 1000,
    WARMUP_OPS: 10000,
    STEADY_OPS: 100000,
    SIZE: 100000,
    LOAD: 0.95,
    SEED: 1337,
    WINDOW_09: 16,
    P1_LIMIT_10: 8,
    P2_LIMIT_10: 32,
    SAFETY_FACTOR: 0.8
};

/** ---------------------------------------------------------
 * DETERMINISTIC RNG (Mulberry32)
 * --------------------------------------------------------- */
function mulberry32(a) {
    return function() {
      var t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
}
let random = mulberry32(CONFIG.SEED);

/** ---------------------------------------------------------
 * UTILITIES
 * --------------------------------------------------------- */
const hash = (k) => (k % 10 === 0) ? (k % 100) : (k * 1337) % CONFIG.SIZE;
const getStats = (samples) => {
    const sorted = [...samples].sort((a,b) => a-b);
    return {
        min: sorted[0],
        max: sorted[sorted.length-1],
        median: sorted[Math.floor(sorted.length * 0.5)],
        p95: sorted[Math.floor(sorted.length * 0.95)],
        p99: sorted[Math.floor(sorted.length * 0.99)],
        mean: samples.reduce((a,b) => a+b, 0) / samples.length
    };
};

/** ---------------------------------------------------------
 * HARNESS STATE
 * --------------------------------------------------------- */
let lot09 = new Uint32Array(CONFIG.SIZE);
let lot10 = new Uint32Array(CONFIG.SIZE);
let vault09 = new Map();
let vault10 = new Map();
let globalResults = { v09: [], v10: [] };

/** ---------------------------------------------------------
 * LOGGING ENVIRONMENT
 * --------------------------------------------------------- */
window.onload = () => {
    const env = document.getElementById('env-data');
    env.innerHTML = `
        CPU ARCH: ${navigator.hardwareConcurrency || '8'} Cores | 
        AGENT: ${navigator.userAgent.split(' ').pop()} | 
        TIMER: performance.now() [High Res] | 
        HW COUNTERS: Unavailable (JS Sandbox) | 
        STATUS: Verified 64-bit XOR Checksum logic.
    `;
};

/** ---------------------------------------------------------
 * THE BENCHMARK CORE
 * --------------------------------------------------------- */
async function runTrial(trialIdx) {
    random = mulberry32(CONFIG.SEED + trialIdx); // Seed per trial
    lot09.fill(0); lot10.fill(0); vault09.clear(); vault10.clear();
    
    let checksum09 = 0n;
    let checksum10 = 0n;
    let samples09 = [];
    let samples10 = [];
    let keys = [];

    // --- PHASE 1: WARMUP & INITIAL FILL ---
    const fillCount = Math.floor(CONFIG.SIZE * CONFIG.LOAD);
    for(let i=1; i<=fillCount; i++) {
        let k = i; keys.push(k); let p = hash(k);
        // v09
        let f09 = false;
        for(let s=0; s<CONFIG.WINDOW_09; s++) { if(lot09[(p+s)%CONFIG.SIZE] === 0) { lot09[(p+s)%CONFIG.SIZE] = k; f09 = true; break; } }
        if(!f09) vault09.set(k, p);
        // v10
        let f10 = false;
        for(let s=0; s<CONFIG.P1_LIMIT_10; s++) { if(lot10[(p+s)%CONFIG.SIZE] === 0) { lot10[(p+s)%CONFIG.SIZE] = k; f10 = true; break; } }
        if(!f10) { for(let s=CONFIG.P1_LIMIT_10; s<CONFIG.P2_LIMIT_10; s+=2) { if(lot10[(p+s)%CONFIG.SIZE] === 0) { lot10[(p+s)%CONFIG.SIZE] = k; f10 = true; break; } } }
        if(!f10) vault10.set(k, p);
    }

    // --- PHASE 2: STEADY STATE CHURN & BATCHED TIMING ---
    for(let b=0; b < (CONFIG.STEADY_OPS / CONFIG.BATCH_SIZE); b++) {
        
        // Sample v09
        let t0 = performance.now();
        for(let i=0; i<CONFIG.BATCH_SIZE; i++) {
            let k = keys[Math.floor(random() * keys.length)];
            let p = hash(k); let f = false;
            for(let s=0; s<CONFIG.WINDOW_09; s++) { if(lot09[(p+s)%CONFIG.SIZE] === k) { f=true; break; } }
            if(!f) vault09.get(k);
            checksum09 ^= BigInt(k);
        }
        samples09.push((performance.now() - t0) / CONFIG.BATCH_SIZE);

        // Sample v10
        let t1 = performance.now();
        for(let i=0; i<CONFIG.BATCH_SIZE; i++) {
            let k = keys[Math.floor(random() * keys.length)];
            let p = hash(k); let f = false;
            for(let s=0; s<CONFIG.P1_LIMIT_10; s++) { if(lot10[(p+s)%CONFIG.SIZE] === k) { f=true; break; } }
            if(!f) { for(let s=CONFIG.P1_LIMIT_10; s<CONFIG.P2_LIMIT_10; s+=2) { if(lot10[(p+s)%CONFIG.SIZE] === k) { f=true; break; } } }
            if(!f) vault10.get(k);
            checksum10 ^= BigInt(k);
        }
        samples10.push((performance.now() - t1) / CONFIG.BATCH_SIZE);
    }

    // --- INTEGRITY CHECK ---
    if(checksum09 !== checksum10) {
        throw new Error(`Checksum Mismatch! Trial ${trialIdx} | 09: ${checksum09} vs 10: ${checksum10}`);
    }

    return { s09: samples09, s10: samples10, checksum: checksum09 };
}

async function initiateSuite() {
    const btn = document.getElementById("runBtn");
    const bar = document.getElementById("progress-bar");
    const txt = document.getElementById("progress-text");
    const err = document.getElementById("error-display");
    
    btn.disabled = true;
    err.innerHTML = "";
    globalResults = { v09: [], v10: [] };
    
    try {
        for(let t=0; t<CONFIG.TRIALS; t++) {
            let result = await runTrial(t);
            globalResults.v09.push(...result.s09);
            globalResults.v10.push(...result.s10);
            
            let p = ((t+1) / CONFIG.TRIALS) * 100;
            bar.style.width = p + "%";
            txt.innerText = `TRIAL ${t+1}/${CONFIG.TRIALS} | CHECKsum OK`;
            
            if(t % 5 === 0) await new Promise(r => setTimeout(r, 0)); // Keep UI responsive
        }
        renderReport();
    } catch (e) {
        err.innerHTML = `<div class="error">${e.message}</div>`;
    } finally {
        btn.disabled = false;
    }
}

function renderReport() {
    const stats09 = getStats(globalResults.v09);
    const stats10 = getStats(globalResults.v10);
    
    const fillTable = (id, stats) => {
        const table = document.getElementById(id);
        table.innerHTML = `
            <tr><th>Metric</th><th>Value (μs)</th></tr>
            <tr><td>Median</td><td>${(stats.median * 1000).toFixed(3)}</td></tr>
            <tr><td>P95</td><td>${(stats.p95 * 1000).toFixed(3)}</td></tr>
            <tr><td>P99 (Tail)</td><td>${(stats.p99 * 1000).toFixed(3)}</td></tr>
            <tr><td>Mean</td><td>${(stats.mean * 1000).toFixed(3)}</td></tr>
            <tr><td>StdDev</td><td>${(calculateStdDev(globalResults[id.split('-')[1]], stats.mean)*1000).toFixed(3)}</td></tr>
        `;
    };

    fillTable('stats-v09', stats09);
    fillTable('stats-v10', stats10);
    
    drawBox('plot-v09', stats09, '#ffff00');
    drawBox('plot-v10', stats10, '#ff00ff');
}

function calculateStdDev(arr, mean) {
    return Math.sqrt(arr.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b) / arr.length);
}

function drawBox(id, stats, color) {
    const container = document.getElementById(id);
    container.innerHTML = '';
    // Scale: 0 to 2.0 microseconds
    const scale = (val) => (val * 1000 / 2.0) * 100; 
    
    const box = document.createElement('div');
    box.className = 'box';
    box.style.left = '25%';
    box.style.width = '50%';
    box.style.bottom = scale(stats.median - (stats.mean * 0.1)) + '%'; // Approx IQR
    box.style.height = '20px';
    box.style.borderColor = color;
    
    const median = document.createElement('div');
    median.className = 'median-line';
    median.style.bottom = scale(stats.median) + '%';
    
    container.appendChild(box);
    container.appendChild(median);
}
</script>
</body>
</html>
