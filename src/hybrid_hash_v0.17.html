<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RTOA v0.17 - The Swarm</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #0f0; padding: 20px; font-size: 13px; }
        .config-panel { background: #111; border: 1px solid #0f0; padding: 15px; margin-bottom: 20px; }
        textarea { width: 100%; height: 150px; background: #000; color: #0f0; border: 1px solid #333; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 15px; background: #0f0; color: #000; font-weight: bold; border: none; cursor: pointer; }
        button:disabled { background: #050; color: #0a0; }
        .progress-container { width: 100%; background: #222; height: 30px; margin: 15px 0; border: 1px solid #0f0; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: #0f0; }
        #progress-text { position: absolute; width: 100%; text-align: center; color: #000; font-weight: bold; top: 6px; }
        .dashboard { display: grid; grid-template-columns: 1fr; gap: 15px; }
        table { width: 100%; border-collapse: collapse; background: #0a0a0a; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background: #222; }
        .penalty-high { color: #ff4444; }
        .penalty-low { color: #44ff44; }
        .log { height: 150px; overflow-y: auto; background: #000; border: 1px solid #222; padding: 10px; margin-top: 10px; color: #888; font-size: 0.8em; }
    </style>
</head>
<body>

<h1>RTOA v0.17: The Swarm (Atomic Multi-Core Contention)</h1>

<div class="config-panel">
    <textarea id="json-config"></textarea>
    <button id="runBtn" onclick="igniteSwarm()">Ignite Swarm Benchmark</button>
</div>

<div class="progress-container">
    <div id="progress-bar"></div>
    <div id="progress-text">IDLE</div>
</div>

<div class="dashboard">
    <table>
        <thead>
            <tr>
                <th>Class</th>
                <th>Config (S/W)</th>
                <th>Cores</th>
                <th>P99 (μs)</th>
                <th>StdDev</th>
                <th>Penalty</th>
                <th>Cache Cross%</th>
                <th>ROI (μs/M)</th>
            </tr>
        </thead>
        <tbody id="results-body"></tbody>
    </table>
</div>

<div class="log" id="sys-log">Initializing system...</div>

<script id="worker-script" type="text/javascript-worker">
    // --- WORKER CORE LOGIC ---
    self.onmessage = function(e) {
        const { config, sharedBuffer, trialSeed, type, workerId, totalWorkers } = e.data;
        const lot = new Int32Array(sharedBuffer);
        const SIZE = config.SIZE;
        
        // Seeded RNG
        function mulberry32(a) {
            return function() {
                var t = a += 0x6D2B79F5;
                t = Math.imul(t ^ t >>> 15, t | 1);
                t ^= t + Math.imul(t ^ t >>> 7, t | 61);
                return ((t ^ t >>> 14) >>> 0) / 4294967296;
            }
        }
        const rand = mulberry32(trialSeed + workerId);
        const getHash = (k) => (k % 10 === 0) ? (k % 100) : (k * 1337) % SIZE;

        let samples = [];
        let crossings = 0;
        let ops = 0;

        // Simulate Workload
        const batchSize = config.BATCH_SIZE;
        const iterations = config.STEADY_OPS / (batchSize * totalWorkers);

        for (let b = 0; b < iterations; b++) {
            let t0 = performance.now();
            for (let i = 0; i < batchSize; i++) {
                let key = Math.floor(rand() * 1000000);
                let p = getHash(key);
                let found = false;
                
                // Tier 1 Window Probing
                for (let s = 0; s < config.WINDOW; s++) {
                    let idx = (p + s) % SIZE;
                    if ((idx >> 4) !== (p >> 4)) crossings++; // Track cache line crossing
                    
                    if (Atomics.load(lot, idx) === key) {
                        found = true;
                        break;
                    }
                }
                ops++;
            }
            samples.push((performance.now() - t0) / batchSize);
        }

        self.postMessage({ samples, crossings, ops });
    };
</script>

<script>
const DEFAULTS = {
    SIZE: 100000,
    LOAD: 0.95,
    TRIALS: 20, // Reduced for multi-core duration
    BATCH_SIZE: 1000,
    STEADY_OPS: 100000,
    STRIDES: [5, 7],
    WINDOWS: [16, 32],
    CORES: [1, 8],
    SEED: 1337
};

document.getElementById('json-config').value = JSON.stringify(DEFAULTS, null, 4);

function log(msg) {
    const l = document.getElementById('sys-log');
    l.innerText += `> ${msg}\n`;
    l.scrollTop = l.scrollHeight;
}

async function igniteSwarm() {
    const config = JSON.parse(document.getElementById('json-config').value);
    const btn = document.getElementById('runBtn');
    const tbody = document.getElementById('results-body');
    btn.disabled = true;
    
    if (typeof SharedArrayBuffer === 'undefined') {
        log("CRITICAL: SharedArrayBuffer unavailable. Check COOP/COEP headers.");
        btn.disabled = false;
        return;
    }

    const sharedBuffer = new SharedArrayBuffer(config.SIZE * 4);
    const results = [];

    for (let coreCount of config.CORES) {
        for (let window of config.WINDOWS) {
            log(`Testing ${coreCount} Cores, Window ${window}...`);
            let allSamples = [];
            let totalCrossings = 0;
            let totalOps = 0;

            for (let t = 0; t < config.TRIALS; t++) {
                const workers = [];
                const promises = [];

                for (let w = 0; d = coreCount, w < d; w++) {
                    const blob = new Blob([document.getElementById('worker-script').textContent], {type: 'text/javascript'});
                    const worker = new Worker(URL.createObjectURL(blob));
                    workers.push(worker);

                    promises.push(new Promise(resolve => {
                        worker.onmessage = (e) => {
                            allSamples.push(...e.data.samples);
                            totalCrossings += e.data.crossings;
                            totalOps += e.data.ops;
                            resolve();
                        };
                        worker.postMessage({
                            config: {...config, WINDOW: window},
                            sharedBuffer,
                            trialSeed: config.SEED + t,
                            workerId: w,
                            totalWorkers: coreCount
                        });
                    }));
                }

                await Promise.all(promises);
                workers.forEach(w => w.terminate());
                
                document.getElementById('progress-bar').style.width = `${((results.length + (t/config.TRIALS)) / (config.CORES.length * config.WINDOWS.length)) * 100}%`;
            }

            allSamples.sort((a, b) => a - b);
            results.push({
                cores: coreCount,
                window,
                p99: allSamples[Math.floor(allSamples.length * 0.99)],
                crossRate: (totalCrossings / totalOps) * 100
            });
        }
    }

    // Render Table
    tbody.innerHTML = results.map((r, i) => {
        const baseline = results.find(b => b.cores === 1 && b.window === r.window);
        const penalty = r.cores === 1 ? 1.0 : (r.p99 / baseline.p99);
        return `
            <tr>
                <td>v0.17</td>
                <td>W:${r.window}</td>
                <td>${r.cores}</td>
                <td>${(r.p99 * 1000).toFixed(3)}</td>
                <td>--</td>
                <td class="${penalty > 1.5 ? 'penalty-high' : 'penalty-low'}">${penalty.toFixed(2)}x</td>
                <td>${r.crossRate.toFixed(2)}%</td>
                <td>--</td>
            </tr>
        `;
    }).join('');

    btn.disabled = false;
    document.getElementById('progress-text').innerText = "SWARM COMPLETE";
}
</script>
</body>
</html>
