<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RTOA v0.15 - The Auto-Tuner</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #0f0; padding: 20px; line-height: 1.2; }
        .control-panel { background: #111; border: 2px solid #0f0; padding: 20px; margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; background: #000; color: #0f0; border: 1px solid #333; font-family: monospace; padding: 10px; margin: 10px 0; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; background: #0f0; color: #000; font-weight: bold; border: none; cursor: pointer; }
        button:disabled { background: #050; color: #0a0; }
        .secondary-btn { background: #444; color: #fff; }
        .dashboard { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .panel { background: #111; border: 1px solid #333; padding: 15px; }
        .progress-container { width: 100%; background: #222; height: 30px; margin: 15px 0; border: 1px solid #0f0; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: #0f0; transition: width 0.1s; }
        #progress-text { position: absolute; width: 100%; text-align: center; color: #000; font-weight: bold; top: 6px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background: #222; color: #fff; cursor: pointer; }
        .best { background: #004400; font-weight: bold; }
        .highlight { color: #fff; }
        .log-panel { font-size: 0.8em; color: #888; margin-top: 10px; height: 100px; overflow-y: auto; border: 1px solid #222; padding: 5px; }
    </style>
</head>
<body>

<h1>RTOA v0.15: Auto-Tuner & ROI Analyzer</h1>

<div class="control-panel">
    <label>Configuration JSON (Edit or Paste):</label>
    <textarea id="json-input"></textarea>
    <div class="btn-group">
        <button class="secondary-btn" onclick="generateTemplate()">Generate Template</button>
        <button id="runBtn" onclick="runAutoTuner()">Ignite Auto-Tuner</button>
    </div>
</div>

<div class="progress-container">
    <div id="progress-bar"></div>
    <div id="progress-text">IDLE</div>
</div>

<div class="dashboard">
    <div class="panel">
        <strong>Ranked Configurations (Sorted by P99):</strong>
        <table id="results-table">
            <thead>
                <tr>
                    <th>Config (S/W)</th>
                    <th>Median (μs)</th>
                    <th>P99 (Tail)</th>
                    <th>StdDev</th>
                    <th>Migrations/s</th>
                    <th>ROI/Mig</th>
                    <th>Checksum</th>
                </tr>
            </thead>
            <tbody id="results-body"></tbody>
        </table>
    </div>
</div>

<div class="log-panel" id="log">System ready. Select "Generate Template" to start.</div>

<script>
let CONFIG = {
    SIZE: 100000,
    LOAD: 0.95,
    TRIALS: 100,
    BATCH_SIZE: 1000,
    WARMUP_OPS: 20000,
    STEADY_OPS: 100000,
    STRIDES: [3, 5, 7],
    WINDOWS: [16, 32, 64],
    HOT_THRESHOLD: 4,
    CHURN_PER_BATCH: 100,
    SEED: 1337
};

function generateTemplate() {
    document.getElementById('json-input').value = JSON.stringify(CONFIG, null, 2);
    log("Template generated. Edit parameters and click Ignite.");
}

function log(msg) {
    const l = document.getElementById('log');
    l.innerHTML += `<div>> ${msg}</div>`;
    l.scrollTop = l.scrollHeight;
}

// Deterministic RNG
function mulberry32(a) {
    return function() {
      var t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
}

function updateChecksum(hash, value) {
    return ((hash * 31n) + BigInt(value)) & ((1n << 64n) - 1n);
}

function getZipfKey(keys, rand) {
    if (rand() < 0.9) return keys[Math.floor(rand() * (keys.length * 0.1))];
    return keys[Math.floor(rand() * keys.length)];
}

const getHash = (k, size) => (k % 10 === 0) ? (k % 100) : (k * 1337) % size;

async function runAutoTuner() {
    try {
        CONFIG = JSON.parse(document.getElementById('json-input').value);
    } catch(e) { alert("Invalid JSON"); return; }

    const btn = document.getElementById('runBtn');
    const tbody = document.getElementById('results-body');
    const bar = document.getElementById('progress-bar');
    const txt = document.getElementById('progress-text');
    
    btn.disabled = true;
    tbody.innerHTML = '';
    let results = [];
    const totalCombos = CONFIG.STRIDES.length * CONFIG.WINDOWS.length;
    let currentCombo = 0;

    for (let stride of CONFIG.STRIDES) {
        for (let window of CONFIG.WINDOWS) {
            currentCombo++;
            log(`Testing Stride: ${stride}, Window: ${window}...`);
            
            let samples = [];
            let totalHealed = 0;
            let savingsHops = 0;
            let lastChecksum = 0n;

            for (let t = 0; t < CONFIG.TRIALS; t++) {
                const random = mulberry32(CONFIG.SEED + t);
                let lot = new Uint32Array(CONFIG.SIZE);
                let vault = new Map();
                let keys = [];
                let trialChecksum = 0n;

                // 1. IGNITION WARMUP (20k ops)
                for(let i=1; i<=CONFIG.WARMUP_OPS; i++) {
                    let p = getHash(i, CONFIG.SIZE);
                    lot[p % CONFIG.SIZE] = i;
                }

                // 2. INITIAL FILL
                let fillCount = Math.floor(CONFIG.SIZE * CONFIG.LOAD);
                for (let i = 1; i <= fillCount; i++) {
                    let k = i; keys.push(k); let p = getHash(k, CONFIG.SIZE);
                    let found = false;
                    // Phase 1: Greedy (8)
                    for(let s=0; s<8; s++) { if(lot[(p+s)%CONFIG.SIZE] === 0) { lot[(p+s)%CONFIG.SIZE] = k; found = true; break; } }
                    // Phase 2: Local Elastic
                    if(!found) { for(let s=9; s<window; s+=stride) { if(lot[(p+s)%CONFIG.SIZE] === 0) { lot[(p+s)%CONFIG.SIZE] = k; found = true; break; } } }
                    if(!found) vault.set(k, { hash: p, hot: 0 });
                }

                // 3. STEADY STATE CHURN
                const batches = CONFIG.STEADY_OPS / CONFIG.BATCH_SIZE;
                for (let b = 0; b < batches; b++) {
                    let batchKeys = Array.from({length: CONFIG.BATCH_SIZE}, () => getZipfKey(keys, random));
                    
                    // CHURN
                    for(let c=0; c<CONFIG.CHURN_PER_BATCH; c++) {
                        let oldIdx = Math.floor(random() * keys.length);
                        let oldK = keys[oldIdx];
                        let newK = 3000000 + (t*1000) + c;
                        // Delete
                        let pOld = getHash(oldK, CONFIG.SIZE);
                        for(let s=0; s<window; s++) { if(lot[(pOld+s)%CONFIG.SIZE] === oldK) { lot[(pOld+s)%CONFIG.SIZE] = 0; break; } }
                        vault.delete(oldK);
                        // Insert
                        let pNew = getHash(newK, CONFIG.SIZE); let fn = false;
                        for(let s=0; s<8; s++) { if(lot[(pNew+s)%CONFIG.SIZE] === 0) { lot[(pNew+s)%CONFIG.SIZE] = newK; fn = true; break; } }
                        if(!fn) { for(let s=9; s<window; s+=stride) { if(lot[(pNew+s)%CONFIG.SIZE] === 0) { lot[(pNew+s)%CONFIG.SIZE] = newK; fn = true; break; } } }
                        if(!fn) vault.set(newK, { hash: pNew, hot: 0 });
                        keys[oldIdx] = newK;
                    }

                    // TIMED BATCH
                    let t0 = performance.now();
                    for(let k of batchKeys) {
                        let p = getHash(k, CONFIG.SIZE); let f = false;
                        for(let s=0; s<8; s++) { if(lot[(p+s)%CONFIG.SIZE] === k) { f=true; break; } }
                        if(!f) { for(let s=9; s<window; s+=stride) { if(lot[(p+s)%CONFIG.SIZE] === k) { f=true; break; } } }
                        if(!f) { 
                            let v = vault.get(k); 
                            if(v) v.hot++; 
                        } else {
                            // ROI Tracking: If found in Tier 1 but was a candidate for Tier 2
                            savingsHops += (window / 2); 
                        }
                        trialChecksum = updateChecksum(trialChecksum, k);
                    }
                    samples.push((performance.now() - t0) / CONFIG.BATCH_SIZE);

                    // VACUUM
                    let mig = 0;
                    for(let [k, obj] of vault.entries()) {
                        if(obj.hot >= CONFIG.HOT_THRESHOLD && mig < 50) {
                            for(let s=0; s<window; s++) {
                                if(lot[(obj.hash+s)%CONFIG.SIZE] === 0) {
                                    lot[(obj.hash+s)%CONFIG.SIZE] = k; vault.delete(k);
                                    totalHealed++; mig++; break;
                                }
                            }
                        }
                    }
                }
                lastChecksum = trialChecksum;
                
                // Update overall progress
                let progress = ((currentCombo - 1) / totalCombos * 100) + ((t + 1) / CONFIG.TRIALS * (100 / totalCombos));
                bar.style.width = progress + "%";
                txt.innerText = `SWEEPING: ${stride}/${window} | TRIAL ${t+1}`;
                if(t % 10 === 0) await new Promise(r => setTimeout(r, 0));
            }

            // Statistical Aggregation
            samples.sort((a,b) => a-b);
            const mean = samples.reduce((a,b) => a+b, 0) / samples.length;
            results.push({
                config: `S:${stride} W:${window}`,
                median: samples[Math.floor(samples.length * 0.5)],
                p99: samples[Math.floor(samples.length * 0.99)],
                std: Math.sqrt(samples.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b) / samples.length),
                migSec: (totalHealed / (CONFIG.TRIALS * (CONFIG.STEADY_OPS / 1000))),
                roi: (savingsHops / totalHealed || 0),
                check: lastChecksum.toString().slice(-6)
            });
        }
    }

    // Rank and Render
    results.sort((a, b) => a.p99 - b.p99);
    results.forEach((r, i) => {
        const row = tbody.insertRow();
        if(i === 0) row.className = 'best';
        row.innerHTML = `
            <td>${r.config}</td>
            <td>${(r.median * 1000).toFixed(3)}</td>
            <td class="highlight">${(r.p99 * 1000).toFixed(3)}</td>
            <td>${(r.std * 1000).toFixed(3)}</td>
            <td>${r.migSec.toFixed(2)}</td>
            <td>${r.roi.toFixed(1)}</td>
            <td>${r.check}</td>
        `;
    });

    log("Sweep complete. Optimal configuration highlighted.");
    btn.disabled = false;
    txt.innerText = "COMPLETE";
}

window.onload = generateTemplate;
</script>
</body>
</html>
