<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RTOA v0.13.1 - Integrity Patch</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #0f0; padding: 20px; line-height: 1.2; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .panel { background: #111; border: 1px solid #333; padding: 15px; border-radius: 4px; }
        .env-log { font-size: 0.85em; color: #888; margin-bottom: 20px; border-left: 3px solid #555; padding-left: 10px; }
        .progress-container { width: 100%; background: #222; height: 25px; margin: 20px 0; border: 1px solid #0f0; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: #0f0; transition: width 0.1s; }
        #progress-text { position: absolute; width: 100%; text-align: center; color: #000; font-weight: bold; top: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background: #222; color: #fff; }
        .v09 { color: #ffff00; } .v10 { color: #ff00ff; }
        .box-plot { background: #000; height: 150px; width: 100%; margin-top: 10px; position: relative; border: 1px solid #444; overflow: hidden; }
        .box { position: absolute; border: 2px solid; opacity: 0.8; }
        .median-line { position: absolute; width: 100%; height: 2px; background: white; }
        button { padding: 15px 30px; background: #0f0; color: #000; font-weight: bold; border: none; cursor: pointer; width: 100%; font-size: 1.1em; }
        button:disabled { background: #050; color: #0a0; cursor: not-allowed; }
        .error { color: #fff; background: #aa0000; font-weight: bold; border: 2px solid #ff4444; padding: 15px; margin: 10px 0; }
    </style>
</head>
<body>

<h1>RTOA v0.13.1: Integrity Patch (Synchronized RNG)</h1>

<div class="env-log" id="env-data">Detecting environment...</div>

<div class="panel">
    <strong>Configuration:</strong>
    <span id="config-summary">Trials: 100 | Batch: 1000 | Load: 95% | Sync-Seed: 1337</span>
</div>

<div class="progress-container">
    <div id="progress-bar"></div>
    <div id="progress-text">READY</div>
</div>

<button id="runBtn" onclick="initiateSuite()">Execute Synchronized Benchmark</button>

<div id="error-display"></div>

<div class="dashboard">
    <div class="panel">
        <div class="title v09">v0.09 (Static Window)</div>
        <div class="box-plot" id="plot-v09"></div>
        <table id="stats-v09">
            <tr><th>Metric</th><th>Value</th></tr>
        </table>
    </div>
    <div class="panel">
        <div class="title v10">v0.10 (Adaptive Stepped)</div>
        <div class="box-plot" id="plot-v10"></div>
        <table id="stats-v10">
            <tr><th>Metric</th><th>Value</th></tr>
        </table>
    </div>
</div>

<script>
const CONFIG = {
    TRIALS: 100,
    BATCH_SIZE: 1000,
    WARMUP_OPS: 10000,
    STEADY_OPS: 100000,
    SIZE: 100000,
    LOAD: 0.95,
    SEED: 1337,
    WINDOW_09: 16,
    P1_LIMIT_10: 8,
    P2_LIMIT_10: 32
};

// Seeded RNG (Mulberry32)
function mulberry32(a) {
    return function() {
      var t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
}

// 64-bit Rolling Hash for Checksum
function updateChecksum(hash, value) {
    const PRIME = 31n;
    const MASK = (1n << 64n) - 1n;
    return ((hash * PRIME) + BigInt(value)) & MASK;
}

const getHash = (k) => (k % 10 === 0) ? (k % 100) : (k * 1337) % CONFIG.SIZE;

let lot09 = new Uint32Array(CONFIG.SIZE);
let lot10 = new Uint32Array(CONFIG.SIZE);
let vault09 = new Map();
let vault10 = new Map();
let globalResults = { v09: [], v10: [] };

window.onload = () => {
    document.getElementById('env-data').innerHTML = `
        CPU: ${navigator.hardwareConcurrency || '8'} Cores | 
        BROWSER: ${navigator.userAgent.split(' ').pop()} | 
        RNG: Synchronized Batching | 
        CHECKSUM: 64-bit Rolling Hash
    `;
};

async function runTrial(trialIdx) {
    const random = mulberry32(CONFIG.SEED + trialIdx);
    lot09.fill(0); lot10.fill(0); vault09.clear(); vault10.clear();
    
    let checksum09 = 0n;
    let checksum10 = 0n;
    let samples09 = [];
    let samples10 = [];
    let keys = [];

    // --- PHASE 1: FILL (Shared Keys) ---
    const fillCount = Math.floor(CONFIG.SIZE * CONFIG.LOAD);
    for(let i=1; i<=fillCount; i++) {
        let k = i; keys.push(k); let p = getHash(k);
        // v09
        let f09 = false;
        for(let s=0; s<CONFIG.WINDOW_09; s++) { if(lot09[(p+s)%CONFIG.SIZE] === 0) { lot09[(p+s)%CONFIG.SIZE] = k; f09 = true; break; } }
        if(!f09) vault09.set(k, p);
        // v10
        let f10 = false;
        for(let s=0; s<CONFIG.P1_LIMIT_10; s++) { if(lot10[(p+s)%CONFIG.SIZE] === 0) { lot10[(p+s)%CONFIG.SIZE] = k; f10 = true; break; } }
        if(!f10) { for(let s=CONFIG.P1_LIMIT_10+1; s<CONFIG.P2_LIMIT_10; s+=2) { if(lot10[(p+s)%CONFIG.SIZE] === 0) { lot10[(p+s)%CONFIG.SIZE] = k; f10 = true; break; } } }
        if(!f10) vault10.set(k, p);
    }

    // --- PHASE 2: SYNCHRONIZED BATCHED TIMING ---
    const batches = CONFIG.STEADY_OPS / CONFIG.BATCH_SIZE;
    for(let b=0; b < batches; b++) {
        // Pre-generate shared batch inputs to keep RNG in sync
        let batchInputs = [];
        for(let i=0; i<CONFIG.BATCH_SIZE; i++) {
            batchInputs.push(keys[Math.floor(random() * keys.length)]);
        }

        // v09 Execution
        let t0 = performance.now();
        for(let k of batchInputs) {
            let p = getHash(k); let f = false;
            for(let s=0; s<CONFIG.WINDOW_09; s++) { if(lot09[(p+s)%CONFIG.SIZE] === k) { f=true; break; } }
            if(!f) vault09.get(k);
            checksum09 = updateChecksum(checksum09, k);
        }
        samples09.push((performance.now() - t0) / CONFIG.BATCH_SIZE);

        // v10 Execution
        let t1 = performance.now();
        for(let k of batchInputs) {
            let p = getHash(k); let f = false;
            for(let s=0; s<CONFIG.P1_LIMIT_10; s++) { if(lot10[(p+s)%CONFIG.SIZE] === k) { f=true; break; } }
            if(!f) { for(let s=CONFIG.P1_LIMIT_10+1; s<CONFIG.P2_LIMIT_10; s+=2) { if(lot10[(p+s)%CONFIG.SIZE] === k) { f=true; break; } } }
            if(!f) vault10.get(k);
            checksum10 = updateChecksum(checksum10, k);
        }
        samples10.push((performance.now() - t1) / CONFIG.BATCH_SIZE);
    }

    if(checksum09 !== checksum10) {
        throw new Error(`CRITICAL INTEGRITY FAILURE: Rolling Hash Mismatch on Trial ${trialIdx}`);
    }

    return { s09: samples09, s10: samples10 };
}

async function initiateSuite() {
    const btn = document.getElementById("runBtn");
    const bar = document.getElementById("progress-bar");
    const txt = document.getElementById("progress-text");
    const err = document.getElementById("error-display");
    
    btn.disabled = true;
    err.innerHTML = "";
    globalResults = { v09: [], v10: [] };
    
    try {
        for(let t=0; t<CONFIG.TRIALS; t++) {
            let result = await runTrial(t);
            globalResults.v09.push(...result.s09);
            globalResults.v10.push(...result.s10);
            
            let p = ((t+1) / CONFIG.TRIALS) * 100;
            bar.style.width = p + "%";
            txt.innerText = `TRIAL ${t+1}/100 | DATA INTEGRITY VERIFIED`;
            
            if(t % 5 === 0) await new Promise(r => setTimeout(r, 0));
        }
        renderReport();
    } catch (e) {
        err.innerHTML = `<div class="error">${e.message}</div>`;
    } finally {
        btn.disabled = false;
    }
}

function renderReport() {
    const stats09 = getStats(globalResults.v09);
    const stats10 = getStats(globalResults.v10);
    
    const fillTable = (id, stats, samples) => {
        const table = document.getElementById(id);
        const mean = stats.mean;
        const stdDev = Math.sqrt(samples.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b) / samples.length);
        
        table.innerHTML = `
            <tr><th>Metric</th><th>Value (μs)</th></tr>
            <tr><td>Median</td><td>${(stats.median * 1000).toFixed(3)}</td></tr>
            <tr><td>P95</td><td>${(stats.p95 * 1000).toFixed(3)}</td></tr>
            <tr><td>P99 (Tail)</td><td>${(stats.p99 * 1000).toFixed(3)}</td></tr>
            <tr><td>StdDev</td><td>${(stdDev * 1000).toFixed(3)}</td></tr>
        `;
    };

    fillTable('stats-v09', stats09, globalResults.v09);
    fillTable('stats-v10', stats10, globalResults.v10);
    
    drawBox('plot-v09', stats09, '#ffff00');
    drawBox('plot-v10', stats10, '#ff00ff');
}

function getStats(samples) {
    const sorted = [...samples].sort((a,b) => a-b);
    return {
        median: sorted[Math.floor(sorted.length * 0.5)],
        p95: sorted[Math.floor(sorted.length * 0.95)],
        p99: sorted[Math.floor(sorted.length * 0.99)],
        mean: samples.reduce((a,b) => a+b, 0) / samples.length
    };
}

function drawBox(id, stats, color) {
    const container = document.getElementById(id);
    container.innerHTML = '';
    const scale = (val) => Math.min(100, (val * 1000 / 1.5) * 100); 
    
    const box = document.createElement('div');
    box.className = 'box';
    box.style.left = '25%'; box.style.width = '50%';
    box.style.bottom = '10%'; box.style.height = scale(stats.p95) + '%';
    box.style.borderColor = color;
    
    const medianLine = document.createElement('div');
    medianLine.className = 'median-line';
    medianLine.style.bottom = scale(stats.median) + '%';
    
    container.appendChild(box);
    container.appendChild(medianLine);
}
</script>
</body>
</html>
