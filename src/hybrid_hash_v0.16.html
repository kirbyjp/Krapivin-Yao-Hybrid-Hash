<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RTOA v0.16 - Refined Tuner</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #0f0; padding: 20px; line-height: 1.2; }
        .control-panel { background: #111; border: 2px solid #0f0; padding: 20px; margin-bottom: 20px; }
        textarea { width: 100%; height: 180px; background: #000; color: #0f0; border: 1px solid #333; font-family: monospace; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 15px; background: #0f0; color: #000; font-weight: bold; border: none; cursor: pointer; font-size: 1.1em; }
        button:disabled { background: #050; color: #0a0; }
        .progress-container { width: 100%; background: #222; height: 30px; margin: 15px 0; border: 1px solid #0f0; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: #0f0; transition: width 0.1s; }
        #progress-text { position: absolute; width: 100%; text-align: center; color: #000; font-weight: bold; top: 6px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background: #222; color: #fff; }
        .v09-row { background: #1a1a00; }
        .best { color: #fff; background: #004400; font-weight: bold; }
        .log-panel { font-size: 0.8em; color: #888; margin-top: 10px; height: 120px; overflow-y: auto; border: 1px solid #222; padding: 5px; white-space: pre-wrap; }
    </style>
</head>
<body>

<h1>RTOA v0.16: Refined Tuner (Baseline v0.09 + Stride Sweep)</h1>

<div class="control-panel">
    <label>Active Configuration (JSON):</label>
    <textarea id="json-input"></textarea>
    <button id="runBtn" onclick="runRefinedTuner()">Ignite Benchmark Suite</button>
</div>

<div class="progress-container">
    <div id="progress-bar"></div>
    <div id="progress-text">READY</div>
</div>

<div class="panel">
    <strong>Ranked Results (Sorted by P99 Stability):</strong>
    <table id="results-table">
        <thead>
            <tr>
                <th>Class</th>
                <th>Config (S/W)</th>
                <th>Median (μs)</th>
                <th>P99 (Tail)</th>
                <th>StdDev</th>
                <th>Mig/s</th>
                <th>Norm ROI (μs/M)</th>
                <th>Check</th>
            </tr>
        </thead>
        <tbody id="results-body"></tbody>
    </table>
</div>

<h3>Concise Raw Log (For RA Review):</h3>
<div class="log-panel" id="log">Waiting for execution...</div>

<script>
// --- DEFAULT CONFIGURATION ---
const DEFAULTS = {
    SIZE: 100000,
    LOAD: 0.95,
    TRIALS: 100,
    BATCH_SIZE: 1000,
    WARMUP_OPS: 20000,
    STEADY_OPS: 100000,
    STRIDES: [5, 7],
    WINDOWS: [16, 32, 64],
    HOT_THRESHOLD: 4,
    CHURN_PER_BATCH: 100,
    CACHE_MISS_PENALTY_NS: 50,
    SEED: 1337
};

window.onload = () => {
    document.getElementById('json-input').value = JSON.stringify(DEFAULTS, null, 2);
};

function log(msg) {
    const l = document.getElementById('log');
    l.innerText += msg + "\n";
    l.scrollTop = l.scrollHeight;
}

// --- DETERMINISTIC RNG & INTEGRITY ---
function mulberry32(a) {
    return function() {
      var t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
}

function updateChecksum(hash, value) {
    return ((hash * 31n) + BigInt(value)) & ((1n << 64n) - 1n);
}

function getZipfKey(keys, rand) {
    if (rand() < 0.9) return keys[Math.floor(rand() * (keys.length * 0.1))];
    return keys[Math.floor(rand() * keys.length)];
}

const getHash = (k, size) => (k % 10 === 0) ? (k % 100) : (k * 1337) % size;

// --- CORE BENCHMARK ENGINE ---
async function runRefinedTuner() {
    let CONFIG;
    try { CONFIG = JSON.parse(document.getElementById('json-input').value); }
    catch(e) { alert("Invalid JSON"); return; }

    const btn = document.getElementById('runBtn');
    const tbody = document.getElementById('results-body');
    const bar = document.getElementById('progress-bar');
    const txt = document.getElementById('progress-text');
    
    btn.disabled = true;
    tbody.innerHTML = '';
    document.getElementById('log').innerText = '';
    
    let results = [];
    let baselineChecksum = 0n;

    // Define Sweep: v0.09 Baseline first, then v0.10 combinations
    let sweep = [{ class: 'v0.09', s: 1, w: 16 }]; 
    for(let s of CONFIG.STRIDES) for(let w of CONFIG.WINDOWS) sweep.push({ class: 'v0.10', s, w });

    for (let i = 0; i < sweep.length; i++) {
        const target = sweep[i];
        let samples = [];
        let totalHealed = 0;
        let savingsHops = 0;
        let lastChecksum = 0n;

        for (let t = 0; t < CONFIG.TRIALS; t++) {
            const random = mulberry32(CONFIG.SEED + t);
            let lot = new Uint32Array(CONFIG.SIZE);
            let vault = new Map();
            let keys = [];
            let trialChecksum = 0n;

            // 1. IGNITION
            for(let j=1; j<=CONFIG.WARMUP_OPS; j++) { lot[getHash(j, CONFIG.SIZE)] = j; }

            // 2. FILL
            let fillCount = Math.floor(CONFIG.SIZE * CONFIG.LOAD);
            for (let j = 1; j <= fillCount; j++) {
                let k = j; keys.push(k); let p = getHash(k, CONFIG.SIZE);
                let found = false;
                if (target.class === 'v0.09') {
                    for(let s=0; s<16; s++) { if(lot[(p+s)%CONFIG.SIZE] === 0) { lot[(p+s)%CONFIG.SIZE] = k; found = true; break; } }
                } else {
                    for(let s=0; s<8; s++) { if(lot[(p+s)%CONFIG.SIZE] === 0) { lot[(p+s)%CONFIG.SIZE] = k; found = true; break; } }
                    if(!found) { for(let s=9; s<target.w; s+=target.s) { if(lot[(p+s)%CONFIG.SIZE] === 0) { lot[(p+s)%CONFIG.SIZE] = k; found = true; break; } } }
                }
                if(!found) vault.set(k, { hash: p, hot: 0 });
            }

            // 3. CHURN & TIMING
            const batches = CONFIG.STEADY_OPS / CONFIG.BATCH_SIZE;
            for (let b = 0; b < batches; b++) {
                let batchKeys = Array.from({length: CONFIG.BATCH_SIZE}, () => getZipfKey(keys, random));
                
                // Churn
                for(let c=0; c<CONFIG.CHURN_PER_BATCH; c++) {
                    let oldK = keys[Math.floor(random() * keys.length)];
                    let pOld = getHash(oldK, CONFIG.SIZE);
                    // Simple delete
                    for(let s=0; s<target.w; s++) { if(lot[(pOld+s)%CONFIG.SIZE] === oldK) { lot[(pOld+s)%CONFIG.SIZE] = 0; break; } }
                    vault.delete(oldK);
                }

                // Timing
                let t0 = performance.now();
                for(let k of batchKeys) {
                    let p = getHash(k, CONFIG.SIZE); let f = false;
                    let range = (target.class === 'v0.09') ? 16 : target.w;
                    for(let s=0; s<range; s++) { if(lot[(p+s)%CONFIG.SIZE] === k) { f=true; break; } }
                    if(!f) { let v = vault.get(k); if(v) v.hot++; }
                    else { savingsHops += (range / 2); }
                    trialChecksum = updateChecksum(trialChecksum, k);
                }
                samples.push((performance.now() - t0) / CONFIG.BATCH_SIZE);

                // Vacuum
                let mig = 0;
                for(let [k, obj] of vault.entries()) {
                    if(obj.hot >= CONFIG.HOT_THRESHOLD && mig < 50) {
                        for(let s=0; s<target.w; s++) {
                            if(lot[(obj.hash+s)%CONFIG.SIZE] === 0) {
                                lot[(obj.hash+s)%CONFIG.SIZE] = k; vault.delete(k);
                                totalHealed++; mig++; break;
                            }
                        }
                    }
                }
            }
            lastChecksum = trialChecksum;
            
            let progress = (i / sweep.length * 100) + ((t+1)/CONFIG.TRIALS * (100/sweep.length));
            bar.style.width = progress + "%";
            txt.innerText = `${target.class} [${target.s}/${target.w}] - TRIAL ${t+1}`;
            if(t % 20 === 0) await new Promise(r => setTimeout(r, 0));
        }

        if (i === 0) baselineChecksum = lastChecksum;
        else if (lastChecksum !== baselineChecksum) {
            log(`!!! FATAL: Checksum mismatch on ${target.class} S:${target.s} W:${target.w}`);
            btn.disabled = false; return;
        }

        samples.sort((a,b) => a-b);
        const mean = samples.reduce((a,b) => a+b, 0) / samples.length;
        const normROI = (savingsHops * CONFIG.CACHE_MISS_PENALTY_NS / 1000) / (CONFIG.TRIALS * (CONFIG.STEADY_OPS / 1000000));

        results.push({
            class: target.class,
            config: target.class === 'v0.09' ? 'BASE' : `S:${target.s} W:${target.w}`,
            median: samples[Math.floor(samples.length * 0.5)],
            p99: samples[Math.floor(samples.length * 0.99)],
            std: Math.sqrt(samples.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b) / samples.length),
            migSec: (totalHealed / (CONFIG.TRIALS * (CONFIG.STEADY_OPS / 1000))),
            roi: normROI,
            check: lastChecksum.toString().slice(-6)
        });
    }

    results.sort((a, b) => a.p99 - b.p99);
    results.forEach((r, idx) => {
        const row = tbody.insertRow();
        if(r.class === 'v0.09') row.className = 'v09-row';
        if(idx === 0 && r.class === 'v0.10') row.className = 'best';
        row.innerHTML = `
            <td>${r.class}</td><td>${r.config}</td>
            <td>${(r.median * 1000).toFixed(3)}</td><td class="highlight">${(r.p99 * 1000).toFixed(3)}</td>
            <td>${(r.std * 1000).toFixed(3)}</td><td>${r.migSec.toFixed(2)}</td>
            <td>${r.roi.toFixed(2)}</td><td>${r.check}</td>
        `;
        log(`${r.class}|${r.config}|p99:${(r.p99*1000).toFixed(2)}|std:${(r.std*1000).toFixed(2)}|roi:${r.roi.toFixed(0)}`);
    });

    txt.innerText = "COMPLETE";
    btn.disabled = false;
}
</script>
</body>
</html>
