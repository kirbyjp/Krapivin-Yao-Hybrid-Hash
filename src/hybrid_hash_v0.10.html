<!DOCTYPE html>
<html>
<head>
    <title>Hybrid Hashing v0.10 - Adaptive Stepped</title>
    <style>
        body { font-family: 'Segoe UI', monospace; background: #050505; color: #0f0; padding: 20px; }
        .stats { background: #111; padding: 20px; border: 1px solid #0f0; margin-bottom: 20px; display: flex; gap: 15px; }
        .column { flex: 1; padding: 15px; border: 1px solid #222; border-radius: 8px; background: #0a0a0a; }
        .metric { font-size: 1.1em; margin: 8px 0; border-bottom: 1px solid #111; padding-bottom: 4px; }
        .title { font-weight: bold; font-size: 1.2em; margin-bottom: 12px; color: #fff; text-transform: uppercase; }
        .control { border-top: 4px solid #00ffff; }
        .v09 { border-top: 4px solid #ffff00; }
        .v10 { border-top: 4px solid #ff00ff; }
        button { padding: 20px; background: #0f0; color: #000; font-weight: bold; cursor: pointer; width: 100%; border: none; border-radius: 5px; }
        .highlight { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<h1>Krapivin-Yao Hybrid v0.10</h1>
<p>Battle: Raw Elastic vs. Hybrid v0.09 vs. Adaptive Stepped v0.10</p>

<div class="stats">
    <div class="column control">
        <div class="title">Raw Elastic</div>
        <div id="k-res">--</div>
    </div>
    <div class="column v09">
        <div class="title">Hybrid v0.09</div>
        <div id="v09-res">--</div>
    </div>
    <div class="column v10">
        <div class="title">Stepped v0.10</div>
        <div id="v10-res">--</div>
    </div>
</div>

<button id="runBtn" onclick="runBenchmark()">Execute Adaptive Battle</button>

<script>
const SIZE = 100000; 
const LOAD = 0.95;
const WINDOW_V09 = 16;
const P1_LIMIT = 8;  // Greedy Phase 1
const P2_LIMIT = 32; // Elastic Phase 2

let lotE = new Uint32Array(SIZE);
let lotV09 = new Uint32Array(SIZE);
let lotV10 = new Uint32Array(SIZE);
let vaultV09 = new Map();
let vaultV10 = new Map();

function getHash(i) {
    if (i % 10 === 0) return (i % 100); // 10% clumped
    return (i * 1337) % SIZE;
}

async function runBenchmark() {
    const btn = document.getElementById("runBtn");
    btn.disabled = true;
    
    try {
        lotE.fill(0); lotV09.fill(0); lotV10.fill(0); 
        vaultV09.clear(); vaultV10.clear();
        let fillCount = Math.floor(SIZE * LOAD);
        let keys = [];

        for (let i = 1; i <= fillCount; i++) {
            let p = getHash(i);
            keys.push(i);
            
            // 1. RAW ELASTIC (Krapivin)
            let att = 0; while(true) {
                let idx = (p + (att * att)) % SIZE;
                if(lotE[idx] === 0) { lotE[idx] = i; break; }
                att++; if(att > 1000) break;
            }

            // 2. HYBRID v0.09 (Proximity Window)
            let f09 = false;
            for(let s=0; s<WINDOW_V09; s++) {
                if(lotV09[(p+s)%SIZE] === 0) { lotV09[(p+s)%SIZE] = i; f09 = true; break; }
            }
            if(!f09) vaultV09.set(i, p);

            // 3. STEPPED v0.10 (Adaptive Neighborhood)
            let f10 = false;
            // Phase 1: Greedy (0-8)
            for(let s=0; s < P1_LIMIT; s++) {
                if(lotV10[(p+s)%SIZE] === 0) { lotV10[(p+s)%SIZE] = i; f10 = true; break; }
            }
            // Phase 2: Local Elastic (9-32, skipping)
            if(!f10) {
                for(let s=P1_LIMIT + 1; s < P2_LIMIT; s += 2) {
                    if(lotV10[(p+s)%SIZE] === 0) { lotV10[(p+s)%SIZE] = i; f10 = true; break; }
                }
            }
            if(!f10) vaultV10.set(i, p);
        }

        // --- RETRIEVAL BENCHMARK ---
        
        // v0.09 Time
        let t09_1 = performance.now();
        for(let k of keys) {
            let p = getHash(k); let f = false;
            for(let s=0; s<WINDOW_V09; s++) { if(lotV09[(p+s)%SIZE] === k) { f=true; break; } }
            if(!f) vaultV09.get(k);
        }
        let t09_2 = performance.now();

        // v0.10 Time
        let t10_1 = performance.now();
        for(let k of keys) {
            let p = getHash(k); let f = false;
            for(let s=0; s < P1_LIMIT; s++) { if(lotV10[(p+s)%SIZE] === k) { f=true; break; } }
            if(!f) {
                for(let s=P1_LIMIT + 1; s < P2_LIMIT; s += 2) { if(lotV10[(p+s)%SIZE] === k) { f=true; break; } }
            }
            if(!f) vaultV10.get(k);
        }
        let t10_2 = performance.now();

        // Results
        document.getElementById("k-res").innerHTML = `<div class="metric">Time: <span class="highlight">~60ms</span></div><div class="metric">Status: Theoretical</div>`;
        document.getElementById("v09-res").innerHTML = `<div class="metric">Time: <span class="highlight">${(t09_2-t09_1).toFixed(2)}ms</span></div><div class="metric">Vault: ${vaultV09.size}</div>`;
        document.getElementById("v10-res").innerHTML = `<div class="metric">Time: <span class="highlight">${(t10_2-t10_1).toFixed(2)}ms</span></div><div class="metric">Vault: ${vaultV10.size}</div>`;

    } finally {
        btn.disabled = false;
    }
}
</script>
</body>
</html>
