<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>RTOA v0.14 - The Pressure Cooker</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #0f0; padding: 20px; line-height: 1.2; }
        .config-panel { background: #111; border: 1px solid #0f0; padding: 20px; margin-bottom: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .config-item { display: flex; flex-direction: column; }
        label { font-size: 0.8em; color: #888; margin-bottom: 5px; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 5px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .panel { background: #111; border: 1px solid #333; padding: 15px; border-radius: 4px; }
        .env-log { font-size: 0.8em; color: #666; margin: 10px 0; border-left: 3px solid #333; padding-left: 10px; }
        .progress-container { width: 100%; background: #222; height: 30px; margin: 20px 0; border: 1px solid #0f0; position: relative; }
        #progress-bar { width: 0%; height: 100%; background: #0f0; }
        #progress-text { position: absolute; width: 100%; text-align: center; color: #000; font-weight: bold; top: 6px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { border: 1px solid #333; padding: 6px; text-align: left; }
        .v09 { color: #ffff00; } .v10 { color: #ff00ff; }
        .box-plot { background: #000; height: 80px; width: 100%; margin-top: 5px; border: 1px solid #444; position: relative; }
        .box { position: absolute; border: 2px solid; bottom: 10px; height: 40px; }
        button { padding: 15px; background: #0f0; color: #000; font-weight: bold; border: none; cursor: pointer; width: 100%; grid-column: span 3; margin-top: 10px; }
        button:disabled { background: #050; color: #0a0; }
        .metric-val { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<h1>RTOA v0.14: Pressure Cooker (Zipfian + Churn + Heat-Map)</h1>

<div class="config-panel">
    <div class="config-item">
        <label>Total Slots (N)</label>
        <input type="number" id="cfg-size" value="100000">
    </div>
    <div class="config-item">
        <label>Load Factor (α)</label>
        <input type="number" id="cfg-load" value="0.95" step="0.01">
    </div>
    <div class="config-item">
        <label>Zipfian Skew (θ)</label>
        <input type="number" id="cfg-skew" value="0.99" step="0.1">
    </div>
    <div class="config-item">
        <label>Prime Stride (v0.10)</label>
        <input type="number" id="cfg-stride" value="3">
    </div>
    <div class="config-item">
        <label>Hotness Threshold</label>
        <input type="number" id="cfg-hot" value="4">
    </div>
    <div class="config-item">
        <label>Churn Rate (per 1k ops)</label>
        <input type="number" id="cfg-churn" value="100">
    </div>
    <button id="runBtn" onclick="runPressureTest()">Ignite Pressure Cooker</button>
</div>

<div class="env-log" id="env-data">Ready for parameterized hardware stress test...</div>

<div class="progress-container">
    <div id="progress-bar"></div>
    <div id="progress-text">IDLE</div>
</div>

<div class="dashboard">
    <div class="panel">
        <div class="title v09">v0.09 (Static Window)</div>
        <div class="box-plot" id="plot-v09"></div>
        <table id="stats-v09"></table>
    </div>
    <div class="panel">
        <div class="title v10">v0.10 (Adaptive Stepped)</div>
        <div class="box-plot" id="plot-v10"></div>
        <table id="stats-v10"></table>
    </div>
</div>

<script>
let random;
function mulberry32(a) {
    return function() {
      var t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
}

function updateChecksum(hash, value) {
    return ((hash * 31n) + BigInt(value)) & ((1n << 64n) - 1n);
}

function getZipfKey(keys, rand) {
    // 90/10 split: 90% of time pick from first 10% of keys
    if (rand() < 0.9) return keys[Math.floor(rand() * (keys.length * 0.1))];
    return keys[Math.floor(rand() * keys.length)];
}

const getHash = (k, size) => (k % 10 === 0) ? (k % 100) : (k * 1337) % size;

async function runPressureTest() {
    const btn = document.getElementById("runBtn");
    const bar = document.getElementById("progress-bar");
    const txt = document.getElementById("progress-text");
    
    const SIZE = parseInt(document.getElementById('cfg-size').value);
    const LOAD = parseFloat(document.getElementById('cfg-load').value);
    const STRIDE = parseInt(document.getElementById('cfg-stride').value);
    const HOT_LIMIT = parseInt(document.getElementById('cfg-hot').value);
    const CHURN = parseInt(document.getElementById('cfg-churn').value);
    const SKEW = parseFloat(document.getElementById('cfg-skew').value);
    const SEED = 1337;

    btn.disabled = true;
    let globalSamples = { v09: [], v10: [] };
    let totalHealed = { v09: 0, v10: 0 };

    try {
        // Reset Lots
        let lot09 = new Uint32Array(SIZE);
        let lot10 = new Uint32Array(SIZE);
        let vault09 = new Map(); 
        let vault10 = new Map();
        let keys = [];

        // 1. INITIAL FILL
        let fillCount = Math.floor(SIZE * LOAD);
        for (let i = 1; i <= fillCount; i++) {
            let k = i; keys.push(k); let p = getHash(k, SIZE);
            // v09
            let f09 = false;
            for(let s=0; s<16; s++) { if(lot09[(p+s)%SIZE] === 0) { lot09[(p+s)%SIZE] = k; f09 = true; break; } }
            if(!f09) vault09.set(k, { hash: p, hot: 0 });
            // v10
            let f10 = false;
            for(let s=0; s<8; s++) { if(lot10[(p+s)%SIZE] === 0) { lot10[(p+s)%SIZE] = k; f10 = true; break; } }
            if(!f10) { for(let s=9; s<32; s+=STRIDE) { if(lot10[(p+s)%SIZE] === 0) { lot10[(p+s)%SIZE] = k; f10 = true; break; } } }
            if(!f10) vault10.set(k, { hash: p, hot: 0 });
        }

        // 2. 100 TRIALS OF CHURN + BENCHMARK
        for (let t = 0; t < 100; t++) {
            random = mulberry32(SEED + t);
            let check09 = 0n, check10 = 0n;

            // --- CHURN PHASE ---
            for(let c=0; c<CHURN; c++) {
                let oldIdx = Math.floor(random() * keys.length);
                let oldK = keys[oldIdx];
                let newK = 2000000 + (t * 5000) + c;
                
                // Delete/Insert v09
                let p09 = getHash(oldK, SIZE);
                for(let s=0; s<16; s++) { if(lot09[(p09+s)%SIZE] === oldK) { lot09[(p09+s)%SIZE] = 0; break; } }
                vault09.delete(oldK);
                let pn09 = getHash(newK, SIZE); let fn09 = false;
                for(let s=0; s<16; s++) { if(lot09[(pn09+s)%SIZE] === 0) { lot09[(pn09+s)%SIZE] = newK; fn09 = true; break; } }
                if(!fn09) vault09.set(newK, { hash: pn09, hot: 0 });

                // Delete/Insert v10
                let p10 = getHash(oldK, SIZE);
                for(let s=0; s<32; s++) { if(lot10[(p10+s)%SIZE] === oldK) { lot10[(p10+s)%SIZE] = 0; break; } }
                vault10.delete(oldK);
                let pn10 = getHash(newK, SIZE); let fn10 = false;
                for(let s=0; s<8; s++) { if(lot10[(pn10+s)%SIZE] === 0) { lot10[(pn10+s)%SIZE] = newK; fn10 = true; break; } }
                if(!fn10) { for(let s=9; s<32; s+=STRIDE) { if(lot10[(pn10+s)%SIZE] === 0) { lot10[(pn10+s)%SIZE] = newK; fn10 = true; break; } } }
                if(!fn10) vault10.set(newK, { hash: pn10, hot: 0 });

                keys[oldIdx] = newK;
            }

            // --- BATCH RETRIEVAL ---
            let batch = Array.from({length: 1000}, () => getZipfKey(keys, random));
            
            // v09
            let start09 = performance.now();
            for(let k of batch) {
                let p = getHash(k, SIZE); let f = false;
                for(let s=0; s<16; s++) { if(lot09[(p+s)%SIZE] === k) { f=true; break; } }
                if(!f) { let entry = vault09.get(k); if(entry) entry.hot++; }
                check09 = updateChecksum(check09, k);
            }
            globalSamples.v09.push((performance.now() - start09) / 1000);

            // v10
            let start10 = performance.now();
            for(let k of batch) {
                let p = getHash(k, SIZE); let f = false;
                for(let s=0; s<8; s++) { if(lot10[(p+s)%SIZE] === k) { f=true; break; } }
                if(!f) { for(let s=9; s<32; s+=STRIDE) { if(lot10[(p+s)%SIZE] === k) { f=true; break; } } }
                if(!f) { let entry = vault10.get(k); if(entry) entry.hot++; }
                check10 = updateChecksum(check10, k);
            }
            globalSamples.v10.push((performance.now() - start10) / 1000);

            if(check09 !== check10) throw new Error(`Integrity Mismatch at Trial ${t}`);

            // --- VACUUM (The Fix) ---
            const configs = [
                { v: vault09, l: lot09, w: 16, tag: 'v09' },
                { v: vault10, l: lot10, w: 32, tag: 'v10' }
            ];
            
            configs.forEach(cfg => {
                let migrations = 0;
                for (let [k, obj] of cfg.v.entries()) {
                    if (obj.hot >= HOT_LIMIT && migrations < 50) {
                        for (let s = 0; s < cfg.w; s++) {
                            let idx = (obj.hash + s) % SIZE;
                            if (cfg.l[idx] === 0) {
                                cfg.l[idx] = k;
                                cfg.v.delete(k);
                                totalHealed[cfg.tag]++;
                                migrations++;
                                break;
                            }
                        }
                    }
                }
            });

            // UI Update
            let progress = t + 1;
            bar.style.width = progress + "%";
            txt.innerText = `TRIAL ${progress}/100 | VAULT-H: ${vault10.size}`;
            if(t % 5 === 0) await new Promise(r => setTimeout(r, 0));
        }
        renderFinalReport(globalSamples, totalHealed);
    } catch(e) { 
        document.getElementById('error-display').innerHTML = `<div class="error">CRITICAL: ${e.message}</div>`;
    } finally { 
        btn.disabled = false; 
    }
}

function renderFinalReport(samples, healed) {
    ['v09', 'v10'].forEach(tag => {
        const data = samples[tag].sort((a,b) => a-b);
        const mean = data.reduce((a,b) => a+b, 0) / data.length;
        const stats = {
            median: data[Math.floor(data.length * 0.5)],
            p95: data[Math.floor(data.length * 0.95)],
            p99: data[Math.floor(data.length * 0.99)],
            std: Math.sqrt(data.map(x => Math.pow(x - mean, 2)).reduce((a, b) => a + b) / data.length)
        };
        document.getElementById(`stats-${tag}`).innerHTML = `
            <tr><th>Metric</th><th>Value</th></tr>
            <tr><td>Median</td><td class="metric-val">${(stats.median * 1000).toFixed(3)}μs</td></tr>
            <tr><td>P99 (Tail)</td><td class="metric-val">${(stats.p99 * 1000).toFixed(3)}μs</td></tr>
            <tr><td>StdDev</td><td class="metric-val">${(stats.std * 1000).toFixed(3)}μs</td></tr>
            <tr><td>Total Repatriated</td><td class="metric-val">${healed[tag]}</td></tr>
        `;
        drawBox(`plot-${tag}`, stats);
    });
}

function drawBox(id, stats) {
    const c = document.getElementById(id); c.innerHTML = '';
    const scale = (v) => Math.min(100, (v * 1000 / 0.8) * 100); // 0.8μs scale
    const b = document.createElement('div');
    b.className = 'box'; b.style.left = '10%'; b.style.width = '80%';
    b.style.bottom = '10%'; b.style.height = scale(stats.p95) + '%';
    b.style.borderColor = id.includes('09') ? '#ffff00' : '#ff00ff';
    c.appendChild(b);
}
</script>
</body>
</html>
